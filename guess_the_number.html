<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guess the Number</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: rgba(251, 188, 5, 0.15);
      border: 1px solid rgba(251, 188, 5, 0.4);
      color: #fbbc05;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      background: linear-gradient(90deg, #fbbc05, #ff6b35);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .subtitle {
      color: rgba(255,255,255,0.55);
      font-size: 0.92rem;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 12px;
      transition: background 0.2s;
    }

    .stat-box:hover { background: rgba(255,255,255,0.1); }

    .stat-icon { font-size: 1.6rem; margin-bottom: 6px; }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: #fbbc05;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 14px;
      border: 2px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 1.1rem;
      font-family: 'Poppins', sans-serif;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.3); }

    .input-group input:focus {
      border-color: #fbbc05;
      background: rgba(251,188,5,0.06);
    }

    .range-hint {
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      margin-bottom: 20px;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #fbbc05, #ff6b35);
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 6px 24px rgba(251,188,5,0.3);
      margin-bottom: 12px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(251,188,5,0.45);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover {
      border-color: rgba(255,255,255,0.4);
      color: #fff;
    }

    .feedback {
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.88rem;
      font-weight: 600;
      display: none;
    }

    .feedback.show { display: block; }
    .feedback.high { background: rgba(251,188,5,0.12); border: 1px solid rgba(251,188,5,0.35); color: #fbbc05; }
    .feedback.low  { background: rgba(100,180,255,0.1); border: 1px solid rgba(100,180,255,0.3); color: #64b4ff; }
    .feedback.win  { background: rgba(72,214,120,0.12); border: 1px solid rgba(72,214,120,0.4); color: #48d678; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Number Game</div>
    <h1>Guess the Number</h1>
    <p class="subtitle">I'm thinking of a number between <strong>1 and 20</strong>.<br>How fast can you find it?</p>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-icon">🎯</div>
        <div class="stat-label">Attempts</div>
        <div class="stat-value" id="attempts">5</div>
      </div>
      <div class="stat-box">
        <div class="stat-icon">🏆</div>
        <div class="stat-label">Highscore</div>
        <div class="stat-value" id="highscore">0</div>
      </div>
    </div>

    <div class="input-group">
      <input type="number" id="guessInput" min="1" max="20" placeholder="Enter your guess..." />
    </div>
    <p class="range-hint">Range: 1 – 20</p>

    <button class="btn-primary" onclick="makeGuess()">▶ Play</button>
    <button class="btn-secondary" onclick="restartGame()">↺ Restart</button>

    <div class="feedback" id="feedback"></div>
  </div>

  <script>
    let secret = Math.floor(Math.random() * 20) + 1;
    let attempts = 5;
    let highscore = 0;

    function makeGuess() {
      const input = document.getElementById('guessInput');
      const val = parseInt(input.value);
      const fb = document.getElementById('feedback');
      if (!val || val < 1 || val > 20) {
        fb.className = 'feedback show high';
        fb.textContent = '⚠️ Please enter a number between 1 and 20.';
        return;
      }
      attempts--;
      document.getElementById('attempts').textContent = attempts;

      if (val === secret) {
        const score = attempts + 1;
        if (score > highscore) { highscore = score; document.getElementById('highscore').textContent = highscore; }
        fb.className = 'feedback show win';
        fb.textContent = '🎉 Correct! You got it in ' + (6 - attempts - 1 + 1) + ' attempt(s)!';
        document.querySelector('.btn-primary').disabled = true;
      } else if (attempts === 0) {
        fb.className = 'feedback show high';
        fb.textContent = '😞 Game over! The number was ' + secret + '.';
        document.querySelector('.btn-primary').disabled = true;
      } else if (val > secret) {
        fb.className = 'feedback show high';
        fb.textContent = '📉 Too high! Try a lower number.';
      } else {
        fb.className = 'feedback show low';
        fb.textContent = '📈 Too low! Try a higher number.';
      }
      input.value = '';
      input.focus();
    }

    function restartGame() {
      secret = Math.floor(Math.random() * 20) + 1;
      attempts = 5;
      document.getElementById('attempts').textContent = attempts;
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('guessInput').value = '';
      document.querySelector('.btn-primary').disabled = false;
    }

    document.getElementById('guessInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') makeGuess();
    });
  </script>
</body>
</html>
