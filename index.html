<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess the number</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/gamebox.css" />
    <link rel="stylesheet" href="./assets/css/toast.css" />
  </head>
  <body>
    <div class="card">
      <header>
        <p class="pill">Number Game</p>
        <h1 class="game-title">Guess the number</h1>
        <p class="game-subline">
          I'm thinking of a number between
          <strong>1 and 20</strong>.<br />How fast can you find it?
        </p>
        <p class="game-info"></p>
      </header>
      <section class="game">
        <div class="game-score">
          <div class="score">
            <h3>🎯</h3>
            <h4>Attempts:</h4>
            <span class="counter"> </span>
          </div>
          <div class="highscore">
            <h3>🏆</h3>
            <h4>Highscore:</h4>
            <span class="counter"> </span>
          </div>
        </div>
        <p class="range-hint">Range: 1 - 20</p>
        <form class="game-input">
          <input
            type="number"
            id="input-number"
            required
            min="1"
            max="20"
            placeholder="Enter your guess..."
          />
          <button id="play-btn" type="button">▶ Play</button>
        </form>
      </section>
      <button id="restart-btn" type="button">↺ Restart</button>
      <div id="toast" class="toast hidden">Gespeichert!</div>
    </div>
    <script src="./assets/js/play.js"></script>
  </body>
</html>
