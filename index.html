<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess the number</title>
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <link rel="stylesheet" href="./assets/css/flexboxing.css" />
  </head>
  <body>
    <header>
      <h1>Guess the number</h1>
      <p>Description</p>
    </header>
    <section class="game-text">
      <h2 class="game-title">Game<span class="counter"></span></h2>
      <p class="game-subline">
        Estimation is <span class="gt-or-st"></span> than number
      </p>
    </section>
    <section class="game">
      <form class="game-input">
        <input type="number" required min="1" max="20" placeholder="--" />
        <button type="btn-play">Play</button>
      </form>
      <div class="game-score">
        <h3 class="score">🎯 Attempts: <span class="counter">20</span></h3>
        <h3 class="highscore">🏆 Highscore: <span class="counter">17</span></h3>
      </div>
    </section>
  </body>
</html>
